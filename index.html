<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Homepage</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 class="intro">Hello World</h1>
        <img src="TrailHead_Hocking.png" alt="Profile photo" class="profile-img">
        <button class="contact-btn">Contact Me</button>
        <div class="map-card">
            <iframe
                class="map-embed"
                title="Map of Columbus, Ohio"
                src="https://www.google.com/maps?q=Columbus,Ohio&z=11&output=embed"
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
                allowfullscreen>
            </iframe>
        </div>
    </div>
</body>
</html>
